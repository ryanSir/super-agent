providers:
  rd_gateway:
    kind: openai_compat
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_API_BASE
    timeout: 60

  anthropic_gateway:
    kind: anthropic_native
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_API_BASE
    timeout: 60

models:
  claude_sonnet:
    provider: anthropic_gateway
    model: claude-4.6-sonnet
    transport: anthropic_native
    reasoning_format: anthropic_thinking
    capabilities:
      reasoning: true
      supports_native_thinking: true

  claude_opus:
    provider: anthropic_gateway
    model: claude-4.6-opus
    transport: anthropic_native
    reasoning_format: anthropic_thinking
    capabilities:
      reasoning: true
      supports_native_thinking: true

  claude_haiku:
    provider: anthropic_gateway
    model: claude-4.5-haiku
    transport: anthropic_native
    reasoning_format: anthropic_thinking
    capabilities:
      reasoning: true
      supports_native_thinking: true

  qwen_fast:
    provider: rd_gateway
    model: qwen3.5-plus
    transport: openai_compat
    reasoning_format: none
    capabilities:
      streaming: true
      tool_calling: true
      reasoning: false

  gpt_54:
    provider: rd_gateway
    model: gpt-5.4
    transport: openai_compat
    reasoning_format: inline_thinking_tags
    capabilities:
      streaming: true
      tool_calling: true
      reasoning: true

  deepseek_r1:
    provider: rd_gateway
    model: deepseek-r1
    transport: openai_compat
    reasoning_format: reasoning_content
    capabilities:
      streaming: true
      tool_calling: true
      reasoning: true

  gemini_25_flash:
    provider: rd_gateway
    model: gemini-2.5-flash
    transport: openai_compat
    reasoning_format: reasoning_content
    capabilities:
      streaming: true
      tool_calling: true
      reasoning: true

roles:
  orchestrator: gemini_25_flash
  planner: claude_opus
  subagent: claude_opus
  classifier: qwen_fast
